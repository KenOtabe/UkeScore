<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎸 UkeScore</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Caveat:wght@500;700&family=JetBrains+Mono:wght@400;600&display=swap');

/*
  データ構造（v2）:
  line = { chars: ["ひ","ま","わ",...], chords: {"0":"G", "5":"D"} }
  chords のキー = chars の index（文字単位）
  位置調整 = chords のキーを ±1 移動するだけ
*/

:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #222636;
  --border: #2e3248;
  --accent: #5b7cf6;
  --accent2: #f6a05b;
  --chord-color: #f6a05b;
  --lyric-color: #e8eaf6;
  --muted: #7880a0;
  --danger: #f65b5b;
  --tab-color: #5bf6b0;
  --font-jp: 'Noto Sans JP', sans-serif;
  --font-hand: 'Caveat', cursive;
  --font-mono: 'JetBrains Mono', monospace;
  --char-w: 1.15rem;   /* fixed width per character cell */
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: var(--font-jp);
  background: var(--bg);
  color: var(--lyric-color);
  height: 100dvh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── TOPBAR ── */
.topbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  flex-wrap: wrap;
}
.app-logo {
  font-family: var(--font-hand);
  font-size: 1.35rem;
  font-weight: 700;
  color: var(--accent);
  flex-shrink: 0;
}
.topbar-spacer { flex: 1; min-width: 8px; }
.btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 7px 12px; border-radius: 8px; border: none;
  font-family: var(--font-jp); font-size: 0.8rem; font-weight: 500;
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.btn-primary  { background: var(--accent); color: #fff; }
.btn-primary:hover  { background: #7090ff; }
.btn-secondary{ background: var(--surface2); color: var(--lyric-color); border: 1px solid var(--border); }
.btn-secondary:hover{ background: var(--border); }
.btn-warn     { background: var(--accent2); color: #1a1000; }
.btn-warn:hover     { background: #ffb570; }
.btn-sm { padding: 5px 9px; font-size: 0.76rem; }
.btn-icon {
  padding: 7px; border-radius: 8px;
  background: var(--surface2); border: 1px solid var(--border);
  cursor: pointer; color: var(--muted); transition: all 0.15s;
}
.btn-icon:hover { color: var(--lyric-color); background: var(--border); }

.toggle-group {
  display: flex;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px; overflow: hidden;
}
.toggle-group button {
  padding: 6px 11px; border: none; background: transparent;
  color: var(--muted); font-family: var(--font-jp); font-size: 0.78rem;
  cursor: pointer; transition: all 0.15s;
}
.toggle-group button.active { background: var(--accent); color: #fff; }

/* ── LAYOUT ── */
.main { display: flex; flex: 1; overflow: hidden; position: relative; }

/* ── SIDEBAR ── */
/* Wrapper holds both the panel and the collapsed tab */
.sidebar-wrap {
  display: flex; flex-shrink: 0;
  position: relative; transition: width 0.24s cubic-bezier(.4,0,.2,1);
  width: 260px;
}
.sidebar-wrap.collapsed { width: 32px; }

/* The actual panel */
.sidebar {
  width: 260px; background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
  transition: transform 0.24s cubic-bezier(.4,0,.2,1),
              opacity   0.18s ease;
  flex-shrink: 0;
  transform: translateX(0); opacity: 1;
}
.sidebar-wrap.collapsed .sidebar {
  transform: translateX(-260px); opacity: 0; pointer-events: none;
}

/* Collapsed tab — thin strip shown when sidebar is hidden */
.sidebar-tab {
  display: none;
  position: absolute; left: 0; top: 0; bottom: 0; width: 32px;
  background: var(--surface); border-right: 1px solid var(--border);
  align-items: center; justify-content: center;
  cursor: pointer; flex-direction: column; gap: 6px;
  transition: background 0.12s;
}
.sidebar-tab:hover { background: var(--surface2); }
.sidebar-wrap.collapsed .sidebar-tab { display: flex; }

/* Rotated label in the tab */
.sidebar-tab-label {
  writing-mode: vertical-rl;
  text-orientation: mixed;
  font-size: 0.68rem; font-weight: 700;
  color: var(--muted); letter-spacing: 0.12em;
  text-transform: uppercase;
  user-select: none;
}
.sidebar-tab-icon { font-size: 0.9rem; color: var(--muted); }

.sidebar-header {
  padding: 12px 14px; border-bottom: 1px solid var(--border);
  font-size: 0.75rem; font-weight: 700; color: var(--muted);
  letter-spacing: 0.1em; text-transform: uppercase;
  display: flex; align-items: center; justify-content: space-between;
}
.sidebar-close {
  background: none; border: none; color: var(--muted);
  cursor: pointer; font-size: 1rem; line-height: 1; padding: 2px 4px;
  border-radius: 4px; transition: color 0.12s, background 0.12s;
}
.sidebar-close:hover { color: var(--lyric-color); background: var(--border); }

.song-list { flex: 1; overflow-y: auto; padding: 6px; }
.song-item {
  padding: 9px 11px; border-radius: 8px; cursor: pointer;
  transition: background 0.12s; margin-bottom: 2px;
}
.song-item:hover { background: var(--surface2); }
.song-item.active { background: rgba(91,124,246,.15); border: 1px solid rgba(91,124,246,.3); }
.song-item .si-title { font-size: 0.88rem; font-weight: 500; }
.song-item .si-sub   { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }
.song-item-del {
  background: none; border: none; color: var(--muted);
  font-size: 0.78rem; cursor: pointer; padding: 2px 5px;
  border-radius: 4px; flex-shrink: 0; line-height: 1;
  transition: all 0.1s;
}
.song-item-del:active { color: var(--danger); background: rgba(246,91,91,.1); }
.song-item-inner { display: flex; align-items: center; gap: 4px; }
.song-item-text  { flex: 1; min-width: 0; }
/* Custom dialog */
.uke-dialog-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.7);
  z-index: 500; display: flex; align-items: center; justify-content: center;
  padding: 20px; backdrop-filter: blur(4px);
}
.uke-dialog-overlay.hidden { display: none; }
.uke-dialog {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; width: min(320px,100%);
  box-shadow: 0 16px 48px rgba(0,0,0,.5);
}
.uke-dialog-body { padding: 20px 20px 14px; font-size: 0.9rem; line-height: 1.6; }
.uke-dialog-ftr  { padding: 10px 16px 14px; display: flex; gap: 8px; justify-content: flex-end; }
.sidebar-footer { padding: 10px; border-top: 1px solid var(--border); }

/* Score area */
.score-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.song-header {
  padding: 14px 22px 10px; border-bottom: 1px solid var(--border);
  background: var(--surface); flex-shrink: 0;
}
.song-title-display { font-family: var(--font-hand); font-size: 1.55rem; font-weight: 700; }
.song-sub-display   { font-size: 0.82rem; color: var(--muted); margin-top: 2px; }

/* Chord reference bar */
.chord-bar {
  padding: 8px 22px; background: var(--surface2);
  border-bottom: 1px solid var(--border);
  display: flex; gap: 10px; overflow-x: auto; flex-shrink: 0;
  align-items: flex-start;
}
.chord-bar::-webkit-scrollbar { height: 3px; }
.chord-bar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.cref {
  flex-shrink: 0; text-align: center; padding: 5px 7px;
  border-radius: 7px; border: 1px solid transparent; transition: all 0.12s;
  cursor: default;
}
.cref:hover { background: var(--surface); border-color: var(--border); }
.cref-name {
  font-family: var(--font-hand); font-size: 0.95rem; font-weight: 700;
  color: var(--chord-color); margin-bottom: 3px;
}
.cref-tab {
  font-family: var(--font-mono); font-size: 0.63rem; line-height: 1.5;
  color: var(--tab-color); background: rgba(91,246,176,.05);
  padding: 2px 4px; border-radius: 3px; text-align: left;
  white-space: pre; display: none;
}
.cref-tab.show { display: block; }

/* ── SCORE SCROLL ── */
.score-scroll { flex: 1; overflow-y: auto; padding: 22px 24px 60px; }
.score-scroll::-webkit-scrollbar { width: 5px; }
.score-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Section */
.sec-block { margin-bottom: 24px; }
.sec-label {
  display: inline-block;
  font-size: 0.68rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--accent); background: rgba(91,124,246,.12);
  padding: 2px 9px; border-radius: 20px; margin-bottom: 10px;
  border: 1px solid rgba(91,124,246,.25);
}

/* ── LINE ──
   Each line = flex row of .char-cell elements.
   Each char-cell is a fixed-width column holding:
     [chord area on top]  ← variable height depending on display mode
     [char on bottom]
*/
.lyric-line {
  display: flex;
  flex-wrap: wrap;
  align-items: flex-end;   /* anchor everything to the text baseline */
  margin-bottom: 10px;
  /* No fixed min-height; height grows naturally from chord area */
}

/* ── CHAR CELL ── */
.char-cell {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  /* width is driven by the character; chord overflows freely above */
  position: relative;
  cursor: default;
}

/* chord area: sits above the character */
.chord-area {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  min-height: 0;           /* collapses when empty */
  /* a small bottom gap ensures chord never touches char */
  padding-bottom: 3px;
}
.chord-area:empty { display: none; }

/* chord name label */
.chord-name {
  font-family: var(--font-hand);
  font-size: var(--score-chord-size, 1.05rem);
  font-weight: 700;
  color: var(--chord-color);
  white-space: nowrap;
  line-height: 1;
}

/* vertical tab block */
.tab-v {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  font-family: var(--font-mono);
  font-size: var(--score-tab-size, 0.72rem);
  font-weight: 700;
  line-height: 1.45;
  color: var(--tab-color);
  background: rgba(91,246,176,.07);
  border: 1px solid rgba(91,246,176,.2);
  border-radius: 4px;
  padding: 2px 5px;
  white-space: nowrap;
  margin-bottom: 4px;
}

/* char label */
.char-label {
  font-size: var(--score-lyric-size, 1.1rem);
  line-height: 1.4;
  color: var(--lyric-color);
  white-space: pre;
  min-width: 0.65em;
  text-align: center;
  display: block;
}

/* Large font mode */
.score-scroll.font-large {
  --score-chord-size: 1.575rem;
  --score-tab-size:   1.08rem;
  --score-lyric-size: 1.65rem;
}


/* ── EMPTY STATE ── */
.empty-state {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 14px; color: var(--muted); padding: 40px; text-align: center;
}
.empty-state .ei { font-size: 2.8rem; }
.empty-state h2 { font-size: 1.05rem; color: var(--lyric-color); }
.empty-state p  { font-size: 0.85rem; line-height: 1.65; }

/* ── AUTO-SCROLL CONTROL ── */
.scroll-ctrl {
  display: flex; align-items: center; gap: 0;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; overflow: hidden; flex-shrink: 0;
}
.scroll-ctrl-label {
  font-size: 0.72rem; color: var(--muted);
  padding: 0 8px 0 10px; white-space: nowrap; user-select: none;
}
.scroll-btn {
  padding: 6px 11px; border: none; background: transparent;
  color: var(--muted); font-family: var(--font-jp); font-size: 0.82rem;
  cursor: pointer; transition: all 0.12s; white-space: nowrap;
  border-left: 1px solid var(--border); line-height: 1;
}
.scroll-btn:hover  { background: var(--border); color: var(--lyric-color); }
.scroll-btn.active { background: var(--success, #4caf82); color: #fff; }
.scroll-btn.stop.active { background: var(--surface2); color: var(--muted); }
.scroll-px-display {
  padding: 0 10px; font-family: var(--font-mono); font-size: 0.78rem;
  color: var(--lyric-color); border-left: 1px solid var(--border);
  min-width: 52px; text-align: center; user-select: none;
}

/* Scrolling indicator line at top of score */
.scroll-progress {
  height: 2px; background: transparent; flex-shrink: 0; transition: background 0.3s;
}
.scroll-progress.running { background: linear-gradient(90deg, var(--accent) 0%, var(--tab-color) 100%); }

@media (max-width: 768px) {
  .sidebar-wrap { width: 230px; }
  .sidebar { width: 230px; }
  .sidebar-wrap.collapsed .sidebar { transform: translateX(-230px); }
  .score-scroll { padding: 14px 14px 60px; }
  .scroll-ctrl-label { display: none; }
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="app-logo">🎸 UkeScore</div>
  <div class="topbar-spacer"></div>
  <div class="toggle-group" id="dispToggle">
    <button class="active" data-m="chord" onclick="setMode('chord')">コード名</button>
    <button             data-m="tab"   onclick="setMode('tab')" style="display:none">タブ譜</button>
    <button             data-m="both"  onclick="setMode('both')">両方</button>
  </div>
  <!-- Font size toggle -->
  <div class="toggle-group" id="fontToggle">
    <button class="active" data-f="normal" onclick="setFontSize('normal')">標準</button>
    <button             data-f="large"  onclick="setFontSize('large')">大</button>
  </div>
  <!-- Auto-scroll control -->
  <div class="scroll-ctrl" id="scrollCtrl">
    <span class="scroll-ctrl-label">🎵 スクロール</span>
    <button class="scroll-btn stop active" id="scrollStopBtn" onclick="toggleScroll()">■ 停止</button>
    <button class="scroll-btn" onclick="changeScrollPx(-1)">◀</button>
    <div class="scroll-px-display" id="scrollPxDisp">0 px</div>
    <button class="scroll-btn" onclick="changeScrollPx(+1)">▶</button>
    <div class="toggle-group" id="intervalToggle" style="border-radius:0;border:none;border-left:1px solid var(--border)">
      <button data-iv="200" onclick="setScrollInterval(200)">遅</button>
      <button data-iv="170" class="active" onclick="setScrollInterval(170)">中</button>
      <button data-iv="140" onclick="setScrollInterval(140)">速</button>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- Sidebar wrap (holds panel + collapsed tab) -->
  <div class="sidebar-wrap" id="sidebarWrap">
    <!-- Collapsed tab strip (visible when collapsed) -->
    <div class="sidebar-tab" onclick="toggleSidebar()">
      <span class="sidebar-tab-icon">🎵</span>
      <span class="sidebar-tab-label">曲リスト</span>
    </div>
    <!-- Sidebar panel -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        曲リスト
        <button class="sidebar-close" onclick="toggleSidebar()" title="閉じる">✕</button>
      </div>
      <div class="song-list" id="songList"></div>
      <div class="sidebar-footer">
        <div style="display:flex;gap:6px">
          <button class="btn btn-secondary btn-sm" style="flex:1" onclick="exportData()">💾 保存</button>
          <button class="btn btn-secondary btn-sm" style="flex:1" onclick="document.getElementById('dataFileInput').click()">📂 読込</button>
        </div>
        <input type="file" id="dataFileInput" accept=".json" style="display:none" onchange="importData(event)">
      </div>
    </div>
  </div>

  <!-- Score area -->
  <div class="score-area" id="scoreArea">
    <div class="empty-state" id="emptyState">
      <div class="ei">🎵</div>
      <h2>楽譜がありません</h2>
      <p>サイドバーの「📂 読込」から<br>曲データファイルを読み込んでください。</p>
    </div>
    <div id="songContent" style="display:none;flex-direction:column;height:100%;overflow:hidden;">
      <div class="song-header">
        <div class="song-title-display" id="titleDisp">—</div>
        <div class="song-sub-display"   id="subDisp"></div>
      </div>
      <div class="chord-bar" id="chordBar"></div>
      <div class="scroll-progress" id="scrollProgress"></div>
      <div class="score-scroll" id="scoreScroll"></div>
    </div>
  </div>
</div>

<!-- Custom confirm dialog -->
<div class="uke-dialog-overlay hidden" id="ukeDialog">
  <div class="uke-dialog">
    <div class="uke-dialog-body" id="ukeDialogMsg"></div>
    <div class="uke-dialog-ftr" id="ukeDialogFtr"></div>
  </div>
</div>

<script>
'use strict';

/* ════════════════════════════════════════════
   DATA MODEL (v2)

   Song {
     title: string,
     subtitle: string,
     sections: Section[]
   }
   Section {
     label: string,
     lines: Line[]
   }
   Line {
     chars:  string[],          // 1文字ずつ分割した配列（スペース含む）
     chords: { [idx:string]: string }  // index文字目 → コード名
   }
   ════════════════════════════════════════════ */

let songs = [];
let currentIdx = -1;
let dispMode = 'chord';  // 'chord' | 'tab' | 'both'

/* ── Chord DB (GCEA tuning, strings: G C E A 低音→高音) ── */
/* ── Chord DB (GCEA tuning, strings: A E C G 上から順) ── */
const CHORD_DB = {
  // 配列順: A弦, E弦, C弦, G弦（上から順）
  'C':   ['3','0','0','0'], 'Cm':  ['3','3','3','0'], 'C7':  ['1','0','0','0'],
  'D':   ['0','2','2','2'], 'Dm':  ['0','1','2','2'], 'D7':  ['0','2','0','2'],
  'E':   ['2','4','4','4'], 'Em':  ['2','3','4','0'], 'E7':  ['2','0','2','1'],
  'F':   ['0','1','0','2'], 'Fm':  ['3','1','0','1'], 'F7':  ['3','1','3','2'],
  'G':   ['2','3','2','0'], 'Gm':  ['1','3','2','0'], 'G7':  ['2','1','2','0'],
  'A':   ['0','0','1','2'], 'Am':  ['0','0','0','2'], 'A7':  ['0','0','1','0'],
  'B':   ['2','2','3','4'], 'Bm':  ['2','2','2','4'], 'B7':  ['2','2','3','2'],
  'B♭6': ['1','1','2','0'], 'B-6': ['2','2','3','0'],
};

function getFrets(name) {
  return CHORD_DB[name?.trim()] || null;
}
function tabRefText(name) {
  const f = getFrets(name);
  if (!f) return 'A:?\nE:?\nC:?\nG:?';
  return `A|${f[0]}\nE|${f[1]}\nC|${f[2]}\nG|${f[3]}`;
}
function tabVertHTML(name) {
  const f = getFrets(name);
  const vals = f || ['?','?','?','?'];
  return `<div class="tab-v">${vals.map(v=>`<div>${v}</div>`).join('')}</div>`;
}

/* ── Persistence ── */
function save() { localStorage.setItem('ukescore_v2', JSON.stringify(songs)); }
function load() {
  try { songs = JSON.parse(localStorage.getItem('ukescore_v2') || '[]'); } catch { songs = []; }
}

/* ── Export / Import ── */
function exportData() {
  const json = JSON.stringify({ version: 2, songs }, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const win = window.open(url, '_blank');
  setTimeout(() => URL.revokeObjectURL(url), 10000);
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const parsed = JSON.parse(ev.target.result);
      // 単曲（旧形式）or 複数曲ファイル両対応
      let incoming = [];
      if (parsed.version === 2 && Array.isArray(parsed.songs)) {
        incoming = parsed.songs;
      } else if (Array.isArray(parsed)) {
        incoming = parsed;
      } else if (parsed.title) {
        incoming = [parsed];
      } else {
        alert('読み込めないファイル形式です');
        return;
      }
      incoming = incoming.map(normalizeSong);
      // 重複タイトルはスキップ（既存優先）
      const existingTitles = new Set(songs.map(s => s.title));
      let added = 0;
      incoming.forEach(s => {
        if (!existingTitles.has(s.title)) { songs.push(s); added++; }
      });
      save();
      renderSongList();
      if (added > 0 && currentIdx < 0) loadSong(0);
      alert(`${added}曲を読み込みました（重複${incoming.length - added}曲はスキップ）`);
    } catch(err) {
      alert('読み込みに失敗しました: ' + err.message);
    }
    e.target.value = ''; // reset so same file can be re-imported
  };
  reader.readAsText(file);
}

/* ── Helpers: convert old block format → new char format ── */
function blocksToLine(blocks) {
  // blocks = [{chord, lyric}, ...]
  const chars = [];
  const chords = {};
  for (const b of blocks) {
    const lyric = b.lyric || '';
    const ci = chars.length;
    const charArr = [...lyric]; // Unicode-aware split
    if (b.chord && charArr.length > 0) {
      chords[String(ci)] = b.chord;
    } else if (b.chord && charArr.length === 0) {
      // chord with no lyric: insert a space holder
      chords[String(ci)] = b.chord;
      charArr.push(' ');
    }
    chars.push(...charArr);
  }
  return { chars, chords };
}

/* ── Normalize any song to v2 format ── */
function normalizeSong(raw) {
  const song = { title: raw.title || '無題', subtitle: raw.subtitle || '', sections: [] };
  for (const sec of (raw.sections || [])) {
    const lines = [];
    for (const line of (sec.lines || [])) {
      if (line.chars !== undefined) {
        // already v2
        lines.push({ chars: line.chars, chords: line.chords || {} });
      } else if (line.blocks) {
        lines.push(blocksToLine(line.blocks));
      }
    }
    song.sections.push({ label: sec.label || '', lines });
  }
  return song;
}

/* ── Song list ── */
function renderSongList() {
  const el = document.getElementById('songList');
  if (!songs.length) {
    el.innerHTML = '<div style="padding:14px;color:var(--muted);font-size:0.83rem;text-align:center">曲がありません</div>';
    return;
  }
  el.innerHTML = songs.map((s,i) => `
    <div class="song-item ${i===currentIdx?'active':''}">
      <div class="song-item-inner">
        <div class="song-item-text" onclick="loadSong(${i})">
          <div class="si-title">${s.title}</div>
          <div class="si-sub">${s.subtitle||''}</div>
        </div>
        <button class="song-item-del" onclick="confirmDeleteSong(${i})" title="削除">🗑</button>
      </div>
    </div>`).join('');
}

/* ── Custom dialog ── */
function ukeConfirm(msg, onOk) {
  document.getElementById('ukeDialogMsg').innerHTML = msg;
  const ftr = document.getElementById('ukeDialogFtr');
  ftr.innerHTML = '';
  const btnCancel = document.createElement('button');
  btnCancel.className = 'btn btn-secondary btn-sm';
  btnCancel.textContent = 'キャンセル';
  btnCancel.onclick = () => document.getElementById('ukeDialog').classList.add('hidden');
  const btnOk = document.createElement('button');
  btnOk.className = 'btn btn-sm';
  btnOk.style.cssText = 'background:var(--danger);color:#fff';
  btnOk.textContent = '削除';
  btnOk.onclick = () => { document.getElementById('ukeDialog').classList.add('hidden'); onOk(); };
  ftr.appendChild(btnCancel);
  ftr.appendChild(btnOk);
  document.getElementById('ukeDialog').classList.remove('hidden');
}

/* ── Delete song ── */
function confirmDeleteSong(idx) {
  const title = songs[idx]?.title || '無題';
  ukeConfirm(`「${title}」を削除しますか？`, () => deleteSong(idx));
}

function deleteSong(idx) {
  songs.splice(idx, 1);
  save();
  if (currentIdx === idx) {
    currentIdx = songs.length > 0 ? Math.min(idx, songs.length - 1) : -1;
    if (currentIdx >= 0) { renderSong(); }
    else {
      document.getElementById('emptyState').style.display = 'flex';
      document.getElementById('songContent').style.display = 'none';
    }
  } else if (currentIdx > idx) {
    currentIdx--;
  }
  renderSongList();
}

function loadSong(idx) {
  currentIdx = idx;
  stopScrollLoop();
  updateScrollUI();
  const ss = document.getElementById('scoreScroll');
  if (ss) ss.scrollTop = 0;
  renderSongList();
  renderSong();
}

/* ── Render song ── */
function renderSong() {
  if (currentIdx < 0 || !songs[currentIdx]) return;
  const song = songs[currentIdx];
  document.getElementById('emptyState').style.display = 'none';
  const sc = document.getElementById('songContent');
  sc.style.display = 'flex';
  document.getElementById('titleDisp').textContent = song.title;
  document.getElementById('subDisp').textContent   = song.subtitle || '';
  renderChordBar(song);
  renderScore(song);
}

function renderChordBar(song) {
  const chords = new Set();
  song.sections.forEach(sec =>
    sec.lines.forEach(line =>
      Object.values(line.chords).forEach(c => { if (c) chords.add(c.trim()); })
    )
  );
  const showTab = dispMode !== 'chord';
  document.getElementById('chordBar').innerHTML =
    [...chords].filter(Boolean).map(c => `
      <div class="cref">
        <div class="cref-name">${c}</div>
        <div class="cref-tab ${showTab?'show':''}">${tabRefText(c)}</div>
      </div>`).join('');
}

function renderScore(song) {
  document.getElementById('scoreScroll').innerHTML =
    song.sections.map((sec, si) => `
      <div class="sec-block">
        ${sec.label ? `<div class="sec-label">${sec.label}</div>` : ''}
        ${sec.lines.map((line, li) => renderLine(line, si, li)).join('')}
      </div>`).join('');
}

function renderLine(line, si, li) {
  const cells = line.chars.map((ch, ci) => renderCell(ch, ci, line.chords, si, li)).join('');
  return `<div class="lyric-line" data-si="${si}" data-li="${li}">${cells}</div>`;
}

function renderCell(ch, ci, chords, si, li) {
  const chord = chords[String(ci)] || '';
  let chordAreaHTML = '';
  if (chord) {
    if (dispMode === 'chord') {
      chordAreaHTML = `<span class="chord-name">${chord}</span>`;
    } else if (dispMode === 'tab') {
      chordAreaHTML = tabVertHTML(chord);
    } else {
      chordAreaHTML = `<span class="chord-name">${chord}</span>${tabVertHTML(chord)}`;
    }
  }
  return `
    <div class="char-cell">
      <div class="chord-area">${chordAreaHTML}</div>
      <div class="char-label">${ch === ' ' ? '&nbsp;' : ch}</div>
    </div>`;
}

/* ── Display mode ── */
function setMode(m) {
  dispMode = m;
  document.querySelectorAll('#dispToggle button').forEach(b =>
    b.classList.toggle('active', b.dataset.m === m));
  if (currentIdx >= 0) {
    renderChordBar(songs[currentIdx]);
    renderScore(songs[currentIdx]);
  }
}

/* ── Font size ── */
function setFontSize(size) {
  document.querySelectorAll('#fontToggle button').forEach(b =>
    b.classList.toggle('active', b.dataset.f === size));
  const ss = document.getElementById('scoreScroll');
  if (ss) ss.classList.toggle('font-large', size === 'large');
}

/* ── Sidebar ── */
function toggleSidebar() {
  document.getElementById('sidebarWrap').classList.toggle('collapsed');
}

/* ── Auto-scroll ── */
const SCROLL_INTERVAL_DEFAULT = 170;
let scrollInterval = SCROLL_INTERVAL_DEFAULT; // ms（変更可能）
let scrollPx      = 0;
let scrollRunning = false;
let scrollTimer   = null;

function setScrollInterval(ms) {
  scrollInterval = ms;
  document.querySelectorAll('#intervalToggle button').forEach(b =>
    b.classList.toggle('active', +b.dataset.iv === ms));
  // 実行中なら即座に再起動して新しい間隔を反映
  if (scrollRunning) startScrollLoop();
}

function updateScrollUI() {
  const disp    = document.getElementById('scrollPxDisp');
  const stopBtn = document.getElementById('scrollStopBtn');
  if (disp)    disp.textContent = scrollPx + ' px';
  if (stopBtn) {
    stopBtn.textContent = scrollRunning ? '■ 停止' : '▶ 再生';
    stopBtn.classList.toggle('active', !scrollRunning);
  }
  document.getElementById('scrollProgress')
    .classList.toggle('running', scrollRunning && scrollPx > 0);
}

function toggleScroll() {
  if (scrollRunning) {
    stopScrollLoop();
  } else {
    if (scrollPx === 0) scrollPx = 1; // 0のまま再生しようとしたら1に
    startScrollLoop();
  }
  updateScrollUI();
}

function changeScrollPx(delta) {
  scrollPx = Math.max(0, Math.min(100, scrollPx + delta));
  if (scrollPx === 0 && scrollRunning) stopScrollLoop();
  if (scrollPx > 0 && !scrollRunning)  startScrollLoop();
  updateScrollUI();
}

function startScrollLoop() {
  stopScrollLoop();
  scrollRunning = true;
  scrollTimer = setInterval(() => {
    if (scrollPx === 0) return;
    const el = document.getElementById('scoreScroll');
    if (!el) return;
    el.scrollTop += scrollPx;
    if (el.scrollTop + el.clientHeight >= el.scrollHeight - 4) {
      stopScrollLoop();
      updateScrollUI();
    }
  }, scrollInterval);
}

function stopScrollLoop() {
  if (scrollTimer) { clearInterval(scrollTimer); scrollTimer = null; }
  scrollRunning = false;
}

// 旧API互換（loadSongから呼ばれる）
function setScrollSpeed(level) { stopScrollLoop(); updateScrollUI(); }
